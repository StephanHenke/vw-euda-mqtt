name: Docker Image

on:
  push:
    branches:
      - main
    tags:
      - "v*.*.*"
  pull_request:
    branches:
      - main
  workflow_dispatch:

env:
  REGISTRY: ghcr.io
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

permissions:
  contents: read
  packages: write

jobs:
  build:
    name: Build and publish Docker image
    runs-on: ubuntu-latest
    env:
      DOCKERHUB_USERNAME: ${{ secrets.DOCKERHUB_USERNAME }}
      DOCKERHUB_TOKEN: ${{ secrets.DOCKERHUB_TOKEN }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Prepare image name
        id: image
        run: echo "name=${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GitHub Container Registry
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: ghcr_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ steps.image.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and optionally push
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.ghcr_meta.outputs.tags }}
          labels: ${{ steps.ghcr_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Log in to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/login-action@v3
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}

      - name: Extract Docker Hub metadata
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        id: dockerhub_meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.DOCKERHUB_USERNAME }}/vw-euda-mqtt
          tags: |
            type=ref,event=branch
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=raw,value=latest,enable={{is_default_branch}}

      - name: Build and push to Docker Hub
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: docker/build-push-action@v7
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.dockerhub_meta.outputs.tags }}
          labels: ${{ steps.dockerhub_meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Update Docker Hub description
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        uses: peter-evans/dockerhub-description@v5
        with:
          username: ${{ env.DOCKERHUB_USERNAME }}
          password: ${{ env.DOCKERHUB_TOKEN }}
          repository: ${{ env.DOCKERHUB_USERNAME }}/vw-euda-mqtt
          short-description: VW/Audi EU Data Act MQTT bridge for smart home and energy management
          readme-filepath: ./DOCKERHUB.md
          enable-url-completion: true

      - name: Update Docker Hub categories
        if: github.event_name != 'pull_request' && env.DOCKERHUB_USERNAME != '' && env.DOCKERHUB_TOKEN != ''
        shell: python
        run: |
          import json
          import os
          import sys
          import urllib.error
          import urllib.request

          namespace = os.environ["DOCKERHUB_USERNAME"]
          repository = "vw-euda-mqtt"
          categories = [
              "internet-of-things",
              "message-queues",
              "developer-tools",
          ]

          def request(url, payload=None, token=None, method=None):
              data = None if payload is None else json.dumps(payload).encode("utf-8")
              headers = {"Content-Type": "application/json"}
              if token:
                  headers["Authorization"] = f"Bearer {token}"
              req = urllib.request.Request(url, data=data, headers=headers, method=method)
              with urllib.request.urlopen(req, timeout=30) as response:
                  body = response.read().decode("utf-8")
                  return response.status, json.loads(body) if body else {}

          auth_errors = []
          auth_payloads = [
              (
                  "https://hub.docker.com/v2/auth/token",
                  {"identifier": namespace, "secret": os.environ["DOCKERHUB_TOKEN"]},
                  "access_token",
              ),
              (
                  "https://hub.docker.com/v2/users/login",
                  {"username": namespace, "password": os.environ["DOCKERHUB_TOKEN"]},
                  "token",
              ),
          ]
          token = None
          for auth_url, auth_payload, token_field in auth_payloads:
              try:
                  _, auth = request(auth_url, auth_payload)
                  token = auth[token_field]
                  break
              except urllib.error.HTTPError as err:
                  auth_errors.append(f"{auth_url} -> {err.code}")
          if not token:
              raise SystemExit("Could not authenticate with Docker Hub: " + " | ".join(auth_errors))

          payload_variants = [
              {"categories": categories},
              {"categories": [{"slug": slug} for slug in categories]},
          ]
          errors = []
          for payload in payload_variants:
              try:
                  status, repo = request(
                      f"https://hub.docker.com/v2/repositories/{namespace}/{repository}/",
                      payload,
                      token=token,
                      method="PATCH",
                  )
                  print("Docker Hub categories updated:", repo.get("categories", []))
                  sys.exit(0)
              except urllib.error.HTTPError as err:
                  errors.append(f"{err.code}: {err.read().decode('utf-8', errors='replace')[:500]}")

          raise SystemExit("Could not update Docker Hub categories: " + " | ".join(errors))
